<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Log in | AppSec Orchestrator</title><link rel="stylesheet" href="/css/style.css"></head>
<body class="auth-page">
  <section class="panel auth-card">
    <a class="brand" href="/">
      <svg viewBox="0 0 36 36" fill="none" width="36" height="36"><rect width="36" height="36" rx="9" fill="#20d39b"/><path d="M18 7l9 4v8c0 5-4 9-9 10-5-1-9-5-9-10v-8l9-4z" fill="#051510" opacity=".9"/><path d="M14 18l3 3 5-5" stroke="#20d39b" stroke-width="2" stroke-linecap="round"/></svg>
      <span>AppSec Orchestrator</span>
    </a>
    <h1>Welcome back</h1>
    <p>Sign in to access your security dashboard.</p>
    <div class="alert" id="message"></div>
    <form data-auth="login">
      <label>Email</label><input required type="email" name="email" autocomplete="email" placeholder="you@example.com">
      <label>Password</label><input required type="password" name="password" autocomplete="current-password" placeholder="••••••••">
      <button class="full">Log in</button>
    </form>
    <p style="margin-top:18px;color:var(--muted);font-size:14px">Don't have an account? <a href="/register">Sign up</a></p>
  </section>
  <script src="/js/app.js"></script><script src="/js/auth.js"></script>
</body>
</html>
