<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Register | AppSec Orchestrator</title><link rel="stylesheet" href="/css/style.css"></head>
<body class="auth-page">
  <section class="panel auth-card">
    <a class="brand" href="/">
      <svg viewBox="0 0 36 36" fill="none" width="36" height="36"><rect width="36" height="36" rx="9" fill="#20d39b"/><path d="M18 7l9 4v8c0 5-4 9-9 10-5-1-9-5-9-10v-8l9-4z" fill="#051510" opacity=".9"/><path d="M14 18l3 3 5-5" stroke="#20d39b" stroke-width="2" stroke-linecap="round"/></svg>
      <span>AppSec Orchestrator</span>
    </a>
    <h1>Create account</h1>
    <p>Start scanning and securing your projects.</p>
    <div class="alert" id="message"></div>
    <form data-auth="register">
      <label>Full name</label><input required name="name" autocomplete="name" placeholder="Your name">
      <label>Email</label><input required type="email" name="email" autocomplete="email" placeholder="you@example.com">
      <label>Password <span style="color:var(--muted);font-weight:400">(min 8 characters)</span></label>
      <input required minlength="8" type="password" name="password" autocomplete="new-password" placeholder="••••••••">
      <button class="full">Create account</button>
    </form>
    <p style="margin-top:18px;color:var(--muted);font-size:14px">Already registered? <a href="/login">Log in</a></p>
  </section>
  <script src="/js/app.js"></script><script src="/js/auth.js"></script>
</body>
</html>
