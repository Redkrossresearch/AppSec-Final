<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Projects | AppSec Orchestrator</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="workspace">
    <header class="appbar" id="appbar"></header>

    <div class="content-header">
      <div>
        <h1>Projects</h1>
        <p>Upload a ZIP or register a folder path to start scanning.</p>
      </div>
    </div>

    <div class="alert" id="message"></div>

    <div class="grid two-col">

      <!-- Upload panel -->
      <article class="panel">
        <h2>📦 Upload Project ZIP</h2>
        <label>Project name</label>
        <input id="uploadName" type="text" placeholder="My Web App">
        <label>Description <span style="color:var(--muted);font-weight:400">(optional)</span></label>
        <input id="uploadDesc" type="text" placeholder="Brief description">
        <div style="height:14px"></div>

        <div class="upload-zone" id="uploadZone">
          <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M24 32V16M24 16l-6 6M24 16l6 6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            <rect x="8" y="28" width="32" height="12" rx="4" fill="none" stroke="currentColor" stroke-width="2"/>
          </svg>
          <p><strong>Click to browse</strong> or drag & drop your ZIP here</p>
          <p style="margin-top:6px;font-size:12px">Max 200MB · .zip files only</p>
          <input type="file" id="fileInput" accept=".zip">
        </div>

        <button class="full" id="uploadBtn" onclick="document.querySelector('#fileInput').click()">
          Upload ZIP
        </button>
      </article>

      <!-- OR register path -->
      <article class="panel">
        <h2>📁 Register Folder Path</h2>
        <p style="color:var(--muted);font-size:13px;margin-bottom:14px">
          If your project is already on this server, enter its absolute path.
        </p>
        <form id="pathForm">
          <label>Project name</label>
          <input required name="name" placeholder="My Project">
          <label>Absolute folder path</label>
          <input required name="path" placeholder="/home/user/my-project">
          <label>Description <span style="color:var(--muted);font-weight:400">(optional)</span></label>
          <textarea name="description" placeholder="What does this project do?"></textarea>
          <button class="full">Register Folder</button>
        </form>
      </article>
    </div>

    <!-- Project list -->
    <article class="panel" style="margin-top:16px">
      <h2>Your Projects</h2>
      <div id="projectList"><p class="empty">Loading...</p></div>
    </article>

  </main>
</div>
<script src="/js/app.js"></script>
<script src="/js/projects.js"></script>
</body>
</html>
